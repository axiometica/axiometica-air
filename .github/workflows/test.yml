# ─────────────────────────────────────────────────────────────────────────────
# CI — backend tests
#
# Runs on every pull-request and on direct pushes to main.
# Spins up Postgres + Redis as service containers so integration tests can
# exercise the real DB layer without mocks.
# ─────────────────────────────────────────────────────────────────────────────

name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentic_os_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/agentic_os_test
      TEST_DATABASE_URL: postgresql://postgres:testpass@localhost:5432/agentic_os_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production
      WATCHER_API_KEY: ci-watcher-key
      SECRET_ENCRYPTION_KEY: 8-aQB2uGPTNrE-7EOjz832IN3HoXsJKzwIGTWM5DjUg=
      PYTHONPATH: backend/src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src/agentic_os \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: backend/coverage.xml
          retention-days: 7
