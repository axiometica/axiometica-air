# ─────────────────────────────────────────────────────────────────────────────
# nginx test site — agentic_nginx_prod_test
#
# Serves /health directly (no upstream dependency so health checks work even
# when testapp is stopped) and proxies everything else to testapp on :8080.
# Also listens on 443 with the self-signed cert generated by entrypoint.sh.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP
server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Direct health response — no upstream needed.
    # Runbooks that call check_health_endpoint land here.
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx","pid":"$pid"}';
    }

    # Prometheus-style metrics — proxied from testapp
    location /metrics {
        proxy_pass            http://127.0.0.1:8080/metrics;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }

    # Application
    location / {
        proxy_pass            http://127.0.0.1:8080;
        proxy_http_version    1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}

# HTTPS — same content over TLS (enables certificate-expiry runbook testing)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx","tls":true,"pid":"$pid"}';
    }

    location /metrics {
        proxy_pass            http://127.0.0.1:8080/metrics;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }

    location / {
        proxy_pass            http://127.0.0.1:8080;
        proxy_http_version    1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}
