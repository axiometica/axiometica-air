# Agentic Platform — Nginx reverse proxy configuration
# Terminates TLS and proxies to the frontend container.
# The frontend's internal nginx handles /api and /ws routing to the backend.

# Use Docker's internal DNS resolver so upstream hostnames are re-resolved at
# request time rather than only at nginx startup.  Without this, nginx fails
# with "host not found in upstream" if a container restarts and changes IP, or
# if nginx starts before the upstream container is ready.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Rate limiting ──────────────────────────────────────────────────────────────
# Zones live in the http context (this file is included inside http{} by the
# default nginx.conf, so top-level directives here are http-scoped).
#
# api   — general API traffic: 30 req/s with a 20-request burst
# auth  — login / token endpoints: 10 req/min with burst 5 — brute-force guard
# watcher — webhook ingest: 120 req/s with burst 60 (high-volume event ingest)
#
# All zones use $binary_remote_addr (4 bytes for IPv4) to keep memory small.
# Each zone holds ~160 000 unique IPs per 1 MB allocated.
limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=watcher:10m rate=120r/s;

# Return HTTP 429 (Too Many Requests) instead of the default 503.
limit_req_status 429;

# Connection-upgrade map (handles both HTTP and WebSocket traffic)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # TLS certificate (self-signed by default; replace with CA-signed in production)
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling (no-op for self-signed; works once a CA cert is used)
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security response headers ─────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:;"
        always;
    # Unique request ID — echoed back so logs on the backend and nginx can be
    # correlated by the same token without extra tooling.
    add_header X-Request-ID $request_id always;

    # ── Auth endpoints — brute-force protection ───────────────────────────────
    # Applies a tight 10 req/min rate limit to login / token refresh endpoints.
    # burst=5 lets a user retry quickly after a typo without being locked out
    # immediately; nodelay means bursts don't queue (excess returns 429 at once).
    location ~ ^/api/auth/(login|token|refresh) {
        limit_req zone=auth burst=5 nodelay;

        set $upstream_frontend "agentic_os_frontend:3000";
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    30s;
    }

    # ── Watcher webhook ingest — high-volume allowance ────────────────────────
    # The watcher agent fires events at high frequency; give it a higher quota
    # while still protecting against runaway loops (burst=60 → ~0.5 s of flood).
    location /api/v1/incidents/ingest {
        limit_req zone=watcher burst=60 nodelay;

        set $upstream_frontend "agentic_os_frontend:3000";
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── General API — standard rate limit ────────────────────────────────────
    # 30 req/s per IP covers normal interactive use; burst=20 handles page loads
    # that fire multiple parallel API calls (incident list + stats + user, etc.).
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        set $upstream_frontend "agentic_os_frontend:3000";
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Everything else — frontend static files + WebSocket ──────────────────
    # No rate limiting on static assets (Vite hashed filenames make abuse
    # pointless — each file is unique per build).
    # WebSocket connections use an indefinitely long read timeout.
    location / {
        set $upstream_frontend "agentic_os_frontend:3000";
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Real-IP forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;

        # Timeouts — long read timeout keeps WebSocket connections alive
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    86400s;

        proxy_buffering off;
    }
}
