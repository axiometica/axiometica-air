# ─────────────────────────────────────────────────────────────────────────────
# Production nginx configuration
#
# Combines what was previously two nginx layers (outer TLS proxy + inner
# frontend static server) into a single nginx process:
#
#   • HTTP 80  → 301 HTTPS redirect
#   • HTTPS 443 → TLS termination
#       /api*  → proxy to backend:8000
#       /ws*   → WebSocket proxy to backend:8000
#       /assets* → static files (30-day immutable cache)
#       /*      → serve index.html (SPA catch-all)
#
# Security headers and TLS settings match nginx/nginx.conf (the dev TLS proxy).
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # TLS certificate (self-signed by default; replace with CA-signed in prod)
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:;"
        always;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy → backend ───────────────────────────────────────────────────
    location /api {
        proxy_pass         http://agentic_os_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── WebSocket proxy → backend ─────────────────────────────────────────────
    location /ws {
        proxy_pass         http://agentic_os_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Long timeout keeps WebSocket connections alive
        proxy_read_timeout 86400s;
        proxy_buffering    off;
    }

    # ── Static assets — long-lived immutable cache ────────────────────────────
    location /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Runbook graph editor ──────────────────────────────────────────────────
    location /editor/ {
        alias /usr/share/nginx/html/editor/;
        try_files $uri $uri/ /editor/index.html;
    }

    # ── SPA catch-all — all unknown paths serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
