        emptyDir: {}
---
# celery-beat: periodic task scheduler — always exactly 1 replica
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: agentic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
      - name: celery-beat
        image: agenticplatform_v2-backend:latest
        imagePullPolicy: Never
        command:
        - celery
        - -A
        - agentic_os.tasks
        - beat
        - -l
        - info
        - -s
        - /app/.beat/celerybeat-schedule
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: REDIS_PASSWORD
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: NEO4J_PASSWORD
        - name: SECRET_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: SECRET_ENCRYPTION_KEY
        - name: DATABASE_URL
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/agentic_os"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379"
        - name: CELERY_BROKER_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
        - name: NEO4J_BOLT_URL
          value: bolt://neo4j:7687
        - name: NEO4J_USER
          value: neo4j
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: /app/src
        volumeMounts:
        - name: beat-data
          mountPath: /app/.beat
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      terminationGracePeriodSeconds: 15
      volumes:
      - name: beat-data
        persistentVolumeClaim:
          claimName: celery-beat-data
