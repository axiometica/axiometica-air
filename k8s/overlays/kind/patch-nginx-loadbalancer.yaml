# Docker Desktop Kubernetes maps LoadBalancer services to localhost automatically.
# No nodePort or MetalLB needed — https://localhost reaches the cluster directly.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: agentic-platform
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
