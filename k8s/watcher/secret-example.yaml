# !! EXAMPLE ONLY — never commit real secrets to git !!
# Create this manually with:
#   kubectl create secret generic watcher-secrets \
#     --namespace axiometica-air \
#     --from-literal=WATCHER_API_KEY=<your-watcher-api-key>
#
# Or with an external secrets manager (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: watcher-secrets
  namespace: axiometica-air
  labels:
    app.kubernetes.io/name: agentic-watcher
type: Opaque
stringData:
  WATCHER_API_KEY: "REPLACE_WITH_REAL_KEY"
