apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiometica-air

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  # secret-example.yaml is intentionally excluded — create the secret manually

