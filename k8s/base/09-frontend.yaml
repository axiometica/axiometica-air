# Horizontally scalable — static nginx serving pre-built React assets.
# All state is in the backend; this pod is completely stateless.
# HPA is wired in overlays/aks/hpa.yaml for cloud deployments.
---
# K8s-specific nginx site config.
# Uses the K8s 'backend' Service ClusterIP (stable, no resolver needed).
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-k8s-site
  namespace: agentic-platform
data:
  default.conf: |
    server {
        listen 3000;
        server_name localhost;

        root /app/dist;
        index index.html;

        client_max_body_size 20m;

        location /api/synthetics/generate {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    180s;
        }

        location /api/chat/stream {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering  off;
            proxy_cache      off;
            proxy_connect_timeout 5s;
            proxy_read_timeout    300s;
        }

        location /api {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        location /ws {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        location /assets {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /editor/ {
            alias /app/editor-dist/;
            try_files $uri $uri/ /editor/index.html;
        }

        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: agentic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: agenticplatform_v2-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: k8s-site-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 512Mi
      volumes:
      - name: k8s-site-config
        configMap:
          name: frontend-k8s-site
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: agentic-platform
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
