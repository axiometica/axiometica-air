# TLS-terminating reverse proxy — singleton (rate-limit state is per-process).
# For cloud deployments the Ingress controller (overlays/aks/ingress.yaml) handles
# TLS and load balancing externally, making this pod optional.
# Service is ClusterIP here; KinD overlay patches it to LoadBalancer for local access.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-k8s-site
  namespace: agentic-platform
data:
  default.conf: |
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=watcher:10m rate=120r/s;
    limit_req_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        add_header X-Frame-Options            "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header X-XSS-Protection           "1; mode=block"                       always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:;" always;
        add_header X-Request-ID $request_id always;

        location ~ ^/api/auth/(login|token|refresh) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        location /api/v1/incidents/ingest {
            limit_req zone=watcher burst=60 nodelay;
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/chat/stream {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;
            proxy_buffering       off;
            proxy_cache           off;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    86400s;
            proxy_buffering off;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: agentic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: agenticplatform_v2-nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: certs
          mountPath: /etc/nginx/certs
        - name: k8s-site-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        readinessProbe:
          httpGet:
            path: /
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["nginx", "-t"]
          initialDelaySeconds: 15
          periodSeconds: 30
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      # emptyDir: the nginx entrypoint auto-generates a self-signed cert on first boot.
      # For production, mount a TLS Secret here instead.
      - name: certs
        emptyDir: {}
      - name: k8s-site-config
        configMap:
          name: nginx-k8s-site
---
# ClusterIP in base — KinD overlay patches this to LoadBalancer for local access.
# AKS uses the Ingress controller in overlays/aks/ingress.yaml instead.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: agentic-platform
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
