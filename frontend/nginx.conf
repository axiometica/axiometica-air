# Use Docker's internal DNS so upstream hostnames are re-resolved after a
# container restart rather than being cached at nginx startup forever.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 3000;
    server_name localhost;

    root /app/dist;
    index index.html;

    # Allow large request bodies for HAR file uploads and LLM payloads
    client_max_body_size 20m;

    # Proxy API requests to the backend.
    # Using a variable forces nginx to re-resolve via the resolver above on each
    # request window, so a backend restart (new container IP) is picked up within
    # 10 seconds instead of requiring a frontend restart.

    # Synthetic monitor script generation — LLM call can take up to 120s
    location /api/synthetics/generate {
        set $backend "agentic_os_backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    180s;
    }

    # SSE streaming endpoint — must disable buffering so chunks flow immediately.
    # Longer read timeout covers slow local LLMs (Ollama on CPU).
    location /api/chat/stream {
        set $backend "agentic_os_backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering  off;
        proxy_cache      off;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
    }

    location /api {
        set $backend "agentic_os_backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Retry on connection failure so a backend restart mid-request
        # doesn't surface as a login error — nginx will try again immediately.
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket connections
    location /ws {
        set $backend "agentic_os_backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Serve static files with cache
    location /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Runbook Graph Editor (built separately, same origin = no CORS)
    location /editor/ {
        alias /app/editor-dist/;
        try_files $uri $uri/ /editor/index.html;
    }

    # Single Page App: all non-matching routes go to index.html.
    # no-cache forces the browser to revalidate index.html on every load so
    # that deploys (new hashed asset filenames) are picked up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
