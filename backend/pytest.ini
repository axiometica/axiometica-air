[pytest]
# pytest configuration for Agentic Platform backend tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    integration: integration tests requiring DB
    unit: unit tests (no DB)
    slow: slow tests that take >1s
    asyncio: async tests
