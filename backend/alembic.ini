# ─────────────────────────────────────────────────────────────────────────────
# Alembic migration configuration
#
# Run migrations:
#   alembic upgrade head
#
# Create a new revision after changing SQLAlchemy models:
#   alembic revision --autogenerate -m "add_my_column"
#
# Stamp an existing database (no re-run of already-applied migrations):
#   alembic stamp head
#
# sqlalchemy.url is overridden by the DATABASE_URL environment variable
# in migrations/env.py — the value below is a fallback for local CLI use.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = src
truncate_slug_length = 40
sqlalchemy.url = postgresql://postgres:agentic_os@localhost:5432/agentic_os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
